<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>my photo gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>my photo gallery</h1>

    <div id="image">
        Hover over an image below to display here.
    </div>

    <img class="preview" src="photo1.jpg" alt="a nice street view" onmouseover="upDate(this)" onmouseout="unDo()">

    <img class="preview" src="photo2.jpg" alt="a quiet coffee shop" onmouseover="upDate(this)" onmouseout="unDo()">

    <img class="preview" src="photo3.jpg" alt="a park with green trees" onmouseover="upDate(this)" onmouseout="unDo()">

    <script src="script.js"></script>

</body>

</html>
